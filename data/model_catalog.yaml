models:
  gpt-5.5:
    provider: openai
    capabilities:
      - coding
      - reasoning
      - general
      - math
      - system_architecture
      - backend_development
      - frontend_development
      - cloud_architecture
      - data_analysis
      - conversion_tracking_setup
      - research_synthesis
      - strategic_reasoning
