# Helmrail Model Registry - Phase 1
# Benchmark-grounded model tags + heuristic task profiles (June 2026)

metadata:
  version: 2
  description: Benchmark-validated model capabilities plus human-curated task profiles for routing.
  routing_principles:
    - Model capabilities are properties of models and should be grounded in benchmarks where possible.
    - Task profiles are domain/workflow categories and may be heuristic when no public benchmark exists.
    - Policies reference real model IDs, then Helmrail resolves each model to the best available subscription.
  sources:
    - name: DeepSWE
      url: https://phly95.github.io/deepswe-interactive-report/
      date: 2026-06
    - name: SWE-bench Verified
      url: https://www.swebench.com/
      date: 2026-02-17
    - name: Chatbot Arena Text
      url: https://lmarena.ai/leaderboard
      date: 2026-06
    - name: Chatbot Arena Creative Writing
      url: https://arena.ai/leaderboard/text/creative-writing
      date: 2026-06
    - name: Vision Arena
      url: https://arena.ai/leaderboard/vision
      date: 2026-06
    - name: LiveBench Global
      url: https://livebench.ai/
      date: 2026-01-08
    - name: ARC-AGI
      url: https://arcprize.org/leaderboard
      date: 2026-04
    - name: Aider Polyglot
      url: https://aider.chat/docs/leaderboards/
      date: 2025-06

