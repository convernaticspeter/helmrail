      deepswe:
        score: 0.692
        rank: 1
        source: DeepSWE
      livebench_global:
        score: 80.71
        rank: 1
        source: LiveBench Global
      livebench_reasoning:
        score: 87.71
        source: LiveBench Global
      livebench_coding:
        score: 82.47
        source: LiveBench Global
      livebench_math:
        score: 96.32
        source: LiveBench Global
    evidence_level: benchmark
    notes: Top performer across coding, reasoning, and general tasks. DeepSWE #1.

  gpt-5.5-pro:
