services:
  helmrail:
    build: .
    ports:
      - "8000:8000"
    environment:
      HELMRAIL_DB_PATH: /data/helmrail.sqlite
      HELMRAIL_MAX_PROVIDER_CALLS: 8
      HELMRAIL_MAX_PARALLEL_WORKERS: 3
      HELMRAIL_PROVIDER_TIMEOUT_SECONDS: 120
      HELMRAIL_MAX_OUTPUT_TOKENS: 16384
      # Set HELMRAIL_API_KEY to require bearer auth for /v1/* mutation endpoints.
      # HELMRAIL_API_KEY: change-me
    volumes:
      - helmrail-data:/data

volumes:
  helmrail-data:
